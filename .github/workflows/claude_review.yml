name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review-with-tracking:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: PR Review with Progress Tracking
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Enable progress tracking
          track_progress: true

          # Your custom review instructions
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing a PR on `glm-ocr-finetune` — a production ML pipeline that
            fine-tunes GLM-OCR for drug name extraction from prescription images.
            Refer to CLAUDE.md for full project context and conventions.

            Review the PR diff with the following focus areas:

            1. **Code Quality**
               - Type hints on all public functions and classes (use `list[str]`, not `List[str]`)
               - No unused imports, variables, or dead code
               - `structlog` used for logging; no bare `print()` or `logging.basicConfig()`
               - Line length ≤ 120 characters
               - Configs go in `config.py` dataclasses, not as magic numbers in scripts
               - `remove_unused_columns = False` preserved if touching `TrainingArguments`
               - `json_repair` used before `json.loads` for any model output parsing

            2. **Security**
               - No credentials, HF tokens, or internal paths hardcoded — use `os.getenv` or CLI args
               - No sensitive data (patient info) logged or exposed in error messages
               - Inputs validated at system boundaries (task file loading, image path resolution)
               - No `assert` used outside tests for security-critical checks

            3. **ML Correctness**
               - Assistant-only masking preserved in `DrugNameDataCollator`
               - LoRA target modules consistent with the 8 learning objectives in `LoRAConfig`
               - `bf16 = True` and `attn_implementation = "flash_attention_2"` preserved
               - `DistributedSampler` used in multi-GPU inference paths
               - Drug name normalization applied consistently across train/inference/evaluate
               - Fuzzy matching threshold logic: labels 0.5, predictions variable (0.5–0.9)

            4. **API & Interface Consistency**
               - New CLI arguments have defaults and are documented
               - Shell scripts expose new arguments via env vars consistently
               - Output paths follow existing conventions (`outputs/`, `evaluation_results.json`)

            5. **Testing**
               - If tests are added, they must live under `tests/` mirroring `src/glm_ocr_finetune/`
               - Tests must not make real model inference calls or download weights
               - Use `monkeypatch` / `unittest.mock` to stub HF model loading and file I/O

            6. **Documentation**
               - Docstrings updated for changed public function signatures
               - CLAUDE.md updated if new models, configs, or architectural decisions are introduced
               - README.md updated if usage workflow or script arguments change

            Provide inline comments for specific line-level issues.
            Use a top-level comment to summarise overall findings and any blocking concerns.
            Classify each finding as: BLOCKING, SUGGESTION, or NITPICK.

          # Tools for comprehensive PR review
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh issue create:*)"