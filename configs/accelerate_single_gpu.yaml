# Accelerate config for single-GPU training / debugging
#
# Usage:
#   accelerate launch --config_file configs/accelerate_single_gpu.yaml \
#       -m glm_ocr_finetune.train --images_root_dir /path/to/images

compute_environment: LOCAL_MACHINE
distributed_type: "NO"
downcast_bf16: "no"
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 1
use_cpu: false
